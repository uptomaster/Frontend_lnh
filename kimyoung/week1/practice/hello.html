<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>강기명 자기소개서</title>
        <link rel="stylesheet" href="./style.css"/>
    </head>
    <body>
        <header>
            <h1 id="heading">안녕하세요 강기명입니다</h1>
            <h4 class="contents">제 소개를 해볼게요</h4>

        </header>

        <nav>
            <ul>
                <li>about</li>
                <li>contact</li>
                <li>profile</li>
            </ul>
        </nav>
        <main>
            <div class="introduction">
                <div>
                    <span class="label">이름:</span>
                    <span class="user-info__value">강기명</span>
                </div>
                <div>
                    <span class="label">나이:</span>

                </div>
                <div>
                    <span class="label">성별:</span>
                    <span class="user-info__value">남자</span>
                </div>
                <div>
                    <span class="label">전화번호:</span>
                    <span class="label-value">010-9284-3006</span>
                </div>    
            </div>
            <section>
                <span class="picture-text">내 사진</span>
                <img src="./kimen.jpg" alt="kimyoung" width="400px"/>
            </section>
            
            <section>
                <label class="comment">한줄 코멘트</label>
                <input type="text">
                <button>저장</button>
            </section>
        </main>

        <footer>
            <a href="https://github.com/kangs-code">github</a>
        </footer>

        <script src="./main.js"></script>
    </body>
</html>
